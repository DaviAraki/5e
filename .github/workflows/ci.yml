name: CI

# Runs typecheck, lint, and tests on every push and pull request so regressions
# are caught before merge. Production deploys (deploy.yml) are independent;
# consider gating it on this workflow if stricter pre-deploy checks are desired.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a superseded run on the same ref so force-pushes / amended commits
# don't burn queue minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
